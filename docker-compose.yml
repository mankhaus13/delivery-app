version: '3.3'

volumes:
    pg-data: { }
    rabbitmq-data: { }
    pgadmin_data: { }

services:
    nginx:
        container_name: expeditors_nginx
        image: nginx
        volumes:
            - ./.docker/conf/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - .:/var/www/html
        ports:
            - "8182:80"
        restart: always
        depends_on:
            - php-fpm
            - postgres
            - mqtt
#            - rabbitmq
        networks:
            - network1

    php-fpm:
        container_name: expeditors_php-fpm
        build: .docker
        restart: always
        volumes:
            - ./.docker/conf/php/php.ini:/usr/local/etc/php/conf.d/php.ini
            - ./.docker/conf/php/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
            - .:/var/www/html
        environment:
            DB_DATABASE: ${DB_DATABASE}
            DB_USERNAME: ${DB_USERNAME}
            DB_HOST: ${DB_HOST}
            DB_PASSWORD: ${DB_PASSWORD}
        extra_hosts:
            - host.docker.internal:host-gateway
        networks:
            - network1

    postgres:
        container_name: expeditors_postgres
        image: public.ecr.aws/docker/library/postgres:15-alpine
        hostname: database
        restart: always
        volumes:
            - ./.docker/postgres:/docker-entrypoint-initdb.d
            - pg-data:/var/lib/postgresql/data:rw
        environment:
            - POSTGRES_DB=${DB_DATABASE}
            - POSTGRES_USER=${DB_USERNAME}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
        ports:
            - "5431:5432"
        networks:
            - network1

    pgadmin:
        container_name: expeditors_pgadmin
        image: dpage/pgadmin4
        restart: always
        environment:
            - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
            - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
            - PGADMIN_LISTEN_ADDRESS=${PGADMIN_LISTEN_ADDRESS}
        ports:
            - "8282:80"
        volumes:
            - pgadmin_data:/var/lib/pgadmin
        depends_on:
            - postgres
        networks:
            - network1

    mqtt:
        container_name: expeditors_mqtt
        restart: always
        image: eclipse-mosquitto
        ports:
            - "1884:1884"
            - "9001:9001"
        volumes:
            - ./.docker/mqtt/config:/mosquitto/config
            - ./.docker/mqtt/data:/mosquitto/data
            - ./.docker/mqtt/log:/mosquitto/log
            - ./.docker/mqtt/certs:/mosquitto/certs
        networks:
            - network1

#    rabbitmq:
#        container_name: expeditors_rabbitmq
#        image: rabbitmq:3-management-alpine  # RabbitMQ image with management UI
#        restart: always
#        volumes:
#            - rabbitmq-data:/var/lib/rabbitmq
#        ports:
#            - "5672:5672"  # Default RabbitMQ port
#            - "15672:15672"  # Management UI port (optional)
#        networks:
#            - network1

networks:
    network1:
        external:
            name: expeditors
