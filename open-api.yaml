  /api/mobile/cancel-reasons:
    get:
      tags:
        - Mobile > Cancelation Reason
      summary: reasons
      responses:
        '200':
          description: OK
          headers:
            Date:
              schema:
                type: string
                example: Thu, 08 Feb 2024 07:20:04 GMT
            Server:
              schema:
                type: string
                example: Apache/2.4.57 (Debian)
            Vary:
              schema:
                type: string
                example: Authorization
            X-Powered-By:
              schema:
                type: string
                example: PHP/8.3.1
            Cache-Control:
              schema:
                type: string
                example: no-cache, private
            X-RateLimit-Limit:
              schema:
                type: integer
                example: '60'
            X-RateLimit-Remaining:
              schema:
                type: integer
                example: '59'
